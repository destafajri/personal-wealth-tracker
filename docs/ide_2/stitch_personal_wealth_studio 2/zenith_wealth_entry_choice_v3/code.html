<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-tertiary selection:text-on-tertiary">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-gutter relative overflow-hidden">
<!-- Background Grid Pattern -->
<div class="absolute inset-0 pointer-events-none opacity-5" style="background-image: radial-gradient(var(--tw-colors-primary) 1px, transparent 1px); background-size: 32px 32px;"></div>
<!-- Header / Logo -->
<div class="mb-12 text-center z-10">
<h1 class="text-headline-lg font-headline-lg text-primary tracking-tight md:text-hero-value md:font-hero-value">
                Zenith Wealth
            </h1>
<p class="text-body-md font-body-md text-on-surface-variant mt-4 max-w-2xl mx-auto border-l-2 border-status-info pl-4 text-left">
                Hitung wealth kamu. Tanpa daftar. Tanpa cloud. Semua data tinggal di komputer kamu.
            </p>
</div>
<!-- Action Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-5xl z-10">
<!-- Mulai Baru Card -->
<button class="group bg-surface-container-low border border-outline-variant rounded-lg p-8 flex flex-col items-center justify-center text-center transition-all duration-300 hover:bg-surface-container hover:border-tertiary hover:shadow-[0_0_15px_rgba(232,196,68,0.1)] h-[300px] focus:outline-none focus:ring-2 focus:ring-tertiary focus:ring-offset-2 focus:ring-offset-background">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-tertiary" data-icon="add" style="font-size: 32px;">add</span>
</div>
<h2 class="text-headline-md font-headline-md text-on-surface mb-2">MULAI BARU</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Mulai dari nol</p>
<div class="mt-8 px-4 py-2 bg-surface-variant rounded-full flex items-center gap-2">
<span class="text-status-warning">💡</span>
<span class="text-tabular-data font-tabular-data text-on-surface-variant">Belum pernah pakai? Pilih ini.</span>
</div>
</button>
<!-- Import Card -->
<div class="relative group h-[300px]">
<input accept=".xlsx" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" id="file-upload" type="file"/>
<div class="absolute inset-0 bg-surface-container-low border-2 border-dashed border-outline-variant rounded-lg p-8 flex flex-col items-center justify-center text-center transition-all duration-300 group-hover:bg-surface-container group-hover:border-primary group-hover:shadow-[0_0_15px_rgba(190,198,224,0.1)] z-10">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center mb-6 group-hover:scale-110 transition-transform group-hover:bg-primary-container">
<span class="material-symbols-outlined text-primary" data-icon="upload_file" style="font-size: 32px;">upload_file</span>
</div>
<h2 class="text-headline-md font-headline-md text-on-surface mb-2">IMPORT .XLSX KAMU</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Drag file ke sini atau klik untuk pilih</p>
<div class="mt-8 px-4 py-2 border border-outline-variant rounded flex items-center gap-2 opacity-50">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="description" style="font-size: 16px;">description</span>
<span class="text-tabular-data font-tabular-data text-on-surface-variant">Hanya menerima format .xlsx</span>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-6 border-t border-outline-variant bg-surface-container-lowest z-10 text-center flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-status-safe" data-icon="lock" data-weight="fill" style="font-size: 16px; font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-tabular-data font-tabular-data text-on-surface-variant tracking-wide">
            100% client-side · Data kamu tetap di komputer kamu sendiri
        </span>
</footer>
<script>
        // Simple drag and drop visual feedback for the import zone
        const dropZone = document.querySelector('.group:has(input[type="file"]) > div');
        const fileInput = document.getElementById('file-upload');

        ['dragenter', 'dragover'].forEach(eventName => {
            fileInput.addEventListener(eventName, preventDefaults, false);
            fileInput.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileInput.addEventListener(eventName, preventDefaults, false);
            fileInput.addEventListener(eventName, unhighlight, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight(e) {
            dropZone.classList.add('border-primary', 'bg-surface-container');
            dropZone.classList.remove('border-outline-variant', 'bg-surface-container-low');
        }

        function unhighlight(e) {
            dropZone.classList.remove('border-primary', 'bg-surface-container');
            dropZone.classList.add('border-outline-variant', 'bg-surface-container-low');
        }
        
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                 // In a real app, handle the file here
                 console.log('File selected:', e.target.files[0].name);
                 // Simulate loading
                 dropZone.innerHTML = `
                    <div class="flex flex-col items-center justify-center animate-pulse">
                        <span class="material-symbols-outlined text-tertiary mb-4" style="font-size: 48px;" data-icon="sync">sync</span>
                        <p class="text-body-md font-body-md text-on-surface">Parsing ${e.target.files[0].name}...</p>
                    </div>
                 `;
            }
        });
    </script>
